name: Black Store Anubis Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Release Anubis (Unzip Project)
        run: |
          unzip Feather.zip -d .
          rm Feather.zip

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build IPA
        run: |
          # هنا نضع أوامر البناء الخاصة بمشروع Feather
          # إذا كان المشروع يحتوي على سكريبت بناء جاهز، سيتم تشغيله هنا
          xcodebuild -project Feather.xcodeproj -scheme Feather -sdk iphoneos -configuration Release archive -archivePath $PWD/build/Feather.xcarchive
          xcodebuild -exportArchive -archivePath $PWD/build/Feather.xcarchive -exportOptionsPlist .github/workflows/exportOptions.plist -exportPath $PWD/build/output

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackStore-Anubis-IPA
          path: build/output/*.ipa
