name: Black Store Anubis Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 البحث وفك ضغط المشروع
        run: |
          # البحث عن أي ملف مضغوط في المستودع
          ZIP_PATH=$(find . -name "*.zip" | head -n 1)
          if [ -z "$ZIP_PATH" ]; then
            echo "❌ خطأ: لم يتم العثور على أي ملف ZIP في المستودع!"
            exit 1
          fi
          echo "✅ وجدنا الملف: $ZIP_PATH"
          unzip -o "$ZIP_PATH" -d .
          echo "📂 قائمة الملفات بعد فك الضغط:"
          ls -R

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: 🏗️ بناء الأرشيف (بالمسار التلقائي)
        run: |
          # البحث عن ملف المشروع .xcodeproj أينما كان
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          if [ -z "$PROJECT_PATH" ]; then
            echo "❌ خطأ: لم نجد ملف .xcodeproj داخل الـ ZIP!"
            exit 1
          fi
          
          # استخراج اسم الـ Scheme تلقائياً
          SCHEME_NAME=$(xcodebuild -list -project "$PROJECT_PATH" | grep -A 5 "Schemes:" | tail -n +2 | head -n 1 | xargs)
          echo "✅ وجدنا المشروع في: $PROJECT_PATH"
          echo "🚀 سنقوم بالبناء باستخدام الـ Scheme: $SCHEME_NAME"
          
          xcodebuild -project "$PROJECT_PATH" \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath $PWD/build/Feather.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGNING_METHOD=manual

      - name: 📦 تحويله إلى IPA
        run: |
          mkdir -p $PWD/build/output/Payload
          cp -r $PWD/build/Feather.xcarchive/Products/Applications/*.app $PWD/build/output/Payload/
          cd $PWD/build/output
          zip -r BlackStore_Anubis.ipa Payload
          echo "✅ تم استخراج الـ IPA بنجاح"

      - name: 📤 رفع ملف بلاك ستور
        uses: actions/upload-artifact@v4
        with:
          name: BlackStore-Anubis-Edition
          path: build/output/*.ipa
