name: Black Store Anubis Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 فك الضغط وتحضير البيئة
        run: |
          ZIP_PATH=$(find . -name "*.zip" | head -n 1)
          unzip -o "$ZIP_PATH" -d .
          echo "✅ تم فك الضغط. الملفات الموجودة:"
          ls -F

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: 🏗️ بناء الأرشيف (الوضع الشامل)
        run: |
          # البحث عن المساحة الشاملة (Workspace) أولاً
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -n 1)
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          
          if [ -n "$WORKSPACE_PATH" ]; then
            echo "✅ وجدنا المساحة الشاملة: $WORKSPACE_PATH"
            BUILD_CMD="-workspace $WORKSPACE_PATH"
          else
            echo "⚠️ لم نجد Workspace، سنستخدم المشروع: $PROJECT_PATH"
            BUILD_CMD="-project $PROJECT_PATH"
          fi

          # تحديد الـ Scheme (غالباً يكون Feather)
          SCHEME_NAME="Feather"
          
          echo "🚀 بدء البناء النهائي لـ Black Store..."
          
          xcodebuild clean $BUILD_CMD -scheme "$SCHEME_NAME"
          
          xcodebuild $BUILD_CMD \
                     -scheme "$SCHEME_NAME" \
                     -configuration Release \
                     -sdk iphoneos \
                     archive -archivePath $PWD/build/Feather.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_ENTITLEMENTS="" \
                     CODE_SIGNING_METHOD=manual

      - name: 📦 استخراج الـ IPA
        run: |
          mkdir -p $PWD/build/output/Payload
          cp -r $PWD/build/Feather.xcarchive/Products/Applications/*.app $PWD/build/output/Payload/
          cd $PWD/build/output
          zip -r BlackStore_Anubis.ipa Payload
          echo "✅ الـ IPA جاهز!"

      - name: 📤 رفع الملف النهائي
        uses: actions/upload-artifact@v4
        with:
          name: BlackStore-Anubis-Edition
          path: build/output/*.ipa
